# Builds the container image, pushes it to Artifact Registry, and deploys it
# to Cloud Run. Run manually with:
#
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions=_REGION=northamerica-northeast1,_REPO=propertycareca,_SERVICE=propertycareca,_CLOUDSQL_INSTANCE=PROJECT:REGION:INSTANCE,_SITE_URL=https://propertycare.ca,_GA_MEASUREMENT_ID=G-XXXXXXX,_GTM_ID=GTM-XXXXXXX
#
# NEXT_PUBLIC_* values are inlined into the JS bundle at build time (Next.js
# does this at `next build`, not at container startup), so they MUST be
# passed as --build-arg here — setting them on the Cloud Run *service*
# afterwards has no effect on an already-built image. None of these are
# secret (they're public identifiers embedded in every served page anyway),
# so plain substitutions are fine; no Secret Manager needed for this set.
#
# Database migrations are NOT run here — run `npm run db:migrate` against the
# instance (via the Cloud SQL Auth Proxy) as a separate step before deploying
# a revision that depends on new schema. See README.md.
substitutions:
  _SITE_URL: ""
  _GA_MEASUREMENT_ID: ""
  _GTM_ID: ""
  _GOOGLE_ADS_CONVERSION_ID: ""
  _GOOGLE_ADS_LABEL_LEAD: ""
  _GOOGLE_ADS_LABEL_BOOKING: ""
  _GOOGLE_ADS_LABEL_DEPOSIT: ""

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg=NEXT_PUBLIC_SITE_URL=${_SITE_URL}
      - --build-arg=NEXT_PUBLIC_GA_MEASUREMENT_ID=${_GA_MEASUREMENT_ID}
      - --build-arg=NEXT_PUBLIC_GTM_ID=${_GTM_ID}
      - --build-arg=NEXT_PUBLIC_GOOGLE_ADS_CONVERSION_ID=${_GOOGLE_ADS_CONVERSION_ID}
      - --build-arg=NEXT_PUBLIC_GOOGLE_ADS_LABEL_LEAD=${_GOOGLE_ADS_LABEL_LEAD}
      - --build-arg=NEXT_PUBLIC_GOOGLE_ADS_LABEL_BOOKING=${_GOOGLE_ADS_LABEL_BOOKING}
      - --build-arg=NEXT_PUBLIC_GOOGLE_ADS_LABEL_DEPOSIT=${_GOOGLE_ADS_LABEL_DEPOSIT}
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}

  - id: deploy
    name: gcr.io/google-cloud-sdk/slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --add-cloudsql-instances=${_CLOUDSQL_INSTANCE}
      - --quiet

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
