services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: propertycare
      POSTGRES_PASSWORD: propertycare
      POSTGRES_DB: propertycare
    ports:
      - "5432:5432"
    volumes:
      - propertycare_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U propertycare"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  propertycare_db_data:
